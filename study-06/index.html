<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼핑 리스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 쇼핑 리스트</h1>
            <p class="subtitle" id="summary">아이템 0개</p>
        </header>

        <form id="add-form" class="add-form">
            <input
                type="text"
                id="item-input"
                placeholder="살 것을 입력하세요..."
                autocomplete="off"
                maxlength="80"
                required
            >
            <button type="submit">추가</button>
        </form>

        <ul id="item-list" class="item-list"></ul>

        <p id="empty-message" class="empty-message">아직 아이템이 없어요. 추가해 보세요!</p>

        <footer>
            <button id="clear-checked" class="clear-btn" type="button">체크된 항목 모두 삭제</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
